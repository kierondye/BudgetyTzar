services:
  postgres:
    image: postgres:16-alpine
    container_name: budgetytzar-postgres
    environment:
      POSTGRES_DB: budgetytzar
      POSTGRES_USER: budgetytzar
      POSTGRES_PASSWORD: budgetytzar
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budgetytzar -d budgetytzar"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
